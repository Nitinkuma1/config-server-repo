# ==========================================
# GLOBAL CONFIGURATION (application.properties)
# These settings apply to ALL microservices
# ==========================================

# 1. The Eureka Server URL
# Both your Order Service and Product Service need to know where Eureka is.
# By putting it here, you don't need to write it in their individual files.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 2. Global Logging Levels (Highly Recommended)
# This sets the default logging for all your apps to INFO, 
# making your Eclipse console much easier to read.
logging.level.root=INFO
logging.level.org.springframework.web=INFO

# 3. A Shared Test Property
# You can use this to prove your services are successfully reading this global file.
global.shared.message=Hello Nitin! All microservices can read this global property from GitHub!
